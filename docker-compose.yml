version: '3.9'

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fin_es_app
      POSTGRES_PASSWORD: fin_es_app
      POSTGRES_DB: finance
    ports:
      - "5432:5432"
    volumes:
      - fin_es_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  fin_es_data: